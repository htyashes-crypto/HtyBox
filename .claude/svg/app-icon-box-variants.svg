<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1044 600" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdc7ba"/>
      <stop offset="1" stop-color="#b6b0a1"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#3a2f28" flood-opacity="0.22"/>
    </filter>
    <!-- 开口盒（盖四片打开）。currentColor 描边，由 use 设 color / stroke-width -->
    <g id="box" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-linecap="round">
      <path d="M80 50 L118 70 L80 90 L42 70 Z"/>
      <path d="M80 90 L80 128"/>
      <path d="M118 70 L118 108"/>
      <path d="M42 70 L42 108"/>
      <path d="M42 108 L80 128 L118 108"/>
      <path d="M42 70 L80 90 L74 110 L30 86 Z"/>
      <path d="M80 90 L118 70 L130 86 L86 110 Z"/>
      <path d="M118 70 L80 50 L86 32 L130 54 Z"/>
      <path d="M80 50 L42 70 L74 32 L30 54 Z"/>
    </g>
    <!-- 极简开口盒：双口(厚度) + 盒体，无盖 -->
    <g id="boxMin" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-linecap="round">
      <path d="M80 52 L120 74 L80 96 L40 74 Z"/>
      <path d="M80 62 L108 78 L80 94 L52 78 Z"/>
      <path d="M80 96 L80 132"/>
      <path d="M120 74 L120 112"/>
      <path d="M40 74 L40 112"/>
      <path d="M40 112 L80 132 L120 112"/>
    </g>
    <!-- 闭合盒：盖面 + 盒体 -->
    <g id="boxClosed" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-linecap="round">
      <path d="M80 48 L120 70 L80 92 L40 70 Z"/>
      <path d="M80 92 L80 130"/>
      <path d="M120 70 L120 110"/>
      <path d="M40 70 L40 110"/>
      <path d="M40 110 L80 130 L120 110"/>
    </g>
  </defs>

  <rect width="1044" height="600" fill="url(#page)"/>

  <text x="50" y="50" font-size="30" font-weight="700" fill="#221f1a">HtyBox · 线框开口盒（基于参考图延伸 10 版）</text>
  <text x="50" y="78" font-size="15" fill="#4d493f">等距线框 · 盖四片打开 —— 配色 / 质感状态 / 品牌结合 三组变体</text>

  <g transform="translate(908,30)">
    <rect x="0" y="0" width="22" height="22" rx="5" fill="#d97757"/>
    <rect x="26" y="0" width="22" height="22" rx="5" fill="#faf9f5" stroke="#0000001a"/>
    <rect x="52" y="0" width="22" height="22" rx="5" fill="#e5e2d9"/>
    <rect x="78" y="0" width="22" height="22" rx="5" fill="#1f1e1d"/>
    <rect x="104" y="0" width="22" height="22" rx="5" fill="#d4a27f"/>
  </g>

  <!-- ROW 0 · 配色 -->
  <g transform="translate(50,110)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <use href="#box" color="#1f1e1d" stroke-width="3"/>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">① 暖深线·奶油底</text>
  </g>
  <g transform="translate(246,110)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <use href="#box" color="#d97757" stroke-width="3"/>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">② 陶土线·奶油底</text>
  </g>
  <g transform="translate(442,110)">
    <rect width="160" height="160" rx="36" fill="#d97757" filter="url(#soft)"/>
    <use href="#box" color="#faf9f5" stroke-width="3"/>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">③ 白线·陶土底</text>
  </g>
  <g transform="translate(638,110)">
    <rect width="160" height="160" rx="36" fill="#1f1e1d" filter="url(#soft)"/>
    <use href="#box" color="#faf9f5" stroke-width="3"/>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">④ 白线·暖深底</text>
  </g>
  <g transform="translate(834,110)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <use href="#box" color="#d97757" stroke-width="5"/>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑤ 粗线·柔和</text>
  </g>

  <!-- ROW 1 · 质感状态 + 品牌结合 -->
  <g transform="translate(50,344)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <use href="#boxMin" color="#1f1e1d" stroke-width="3"/>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑥ 极简·无盖</text>
  </g>
  <g transform="translate(246,344)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <use href="#boxClosed" color="#1f1e1d" stroke-width="3"/>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑦ 闭合盒·盖好</text>
  </g>
  <g transform="translate(442,344)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <use href="#box" color="#1f1e1d" stroke-width="3"/>
    <g fill="#d97757">
      <rect x="72" y="56" width="6" height="28" rx="3"/>
      <rect x="84" y="56" width="6" height="28" rx="3"/>
      <rect x="72" y="67" width="18" height="6" rx="3"/>
    </g>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑧ 盒中 H</text>
  </g>
  <g transform="translate(638,344)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <use href="#box" color="#1f1e1d" stroke-width="3"/>
    <path d="M80 56 L80 84 M66 70 L94 70 M70 60 L90 80 M90 60 L70 80" stroke="#d97757" stroke-width="3" stroke-linecap="round"/>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑨ 盒中星芒</text>
  </g>
  <g transform="translate(834,344)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <use href="#box" color="#1f1e1d" stroke-width="3"/>
    <rect x="63" y="64" width="8" height="20" rx="2" fill="#d4a27f"/>
    <rect x="76" y="58" width="8" height="24" rx="2" fill="#d97757"/>
    <rect x="89" y="64" width="8" height="20" rx="2" fill="#c15f3c"/>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑩ 盒中内容</text>
  </g>

  <text x="50" y="568" font-size="13" fill="#4d493f">均基于参考图的等距线框开口盒。告诉我编号,以及要不要调线粗细 / 盖张开角度 / 盒高 / 配色。</text>
</svg>

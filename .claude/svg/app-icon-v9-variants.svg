<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1136 460" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#3a2f28" flood-opacity="0.22"/>
    </filter>
    <!-- 花瓣（长 / 短），无填充，由 use 设色 -->
    <path id="pet" d="M0 -8 C11 -8 11 -26 0 -48 C-11 -26 -11 -8 0 -8 Z"/>
    <path id="petS" d="M0 -6 C8 -6 8 -18 0 -32 C-8 -18 -8 -6 0 -6 Z"/>

    <!-- V1 实心花瓣 + 镂空心 -->
    <g id="v1">
      <rect width="160" height="160" rx="36" fill="#d97757"/>
      <g transform="translate(80,84)" fill="#faf9f5">
        <use href="#pet" transform="rotate(0)"/><use href="#pet" transform="rotate(60)"/><use href="#pet" transform="rotate(120)"/>
        <use href="#pet" transform="rotate(180)"/><use href="#pet" transform="rotate(240)"/><use href="#pet" transform="rotate(300)"/>
      </g>
      <circle cx="80" cy="84" r="7.5" fill="#d97757"/>
    </g>

    <!-- V2 描边交织环（OpenAI 正宗） -->
    <g id="v2">
      <rect width="160" height="160" rx="36" fill="#d97757"/>
      <g transform="translate(80,84)" fill="none" stroke-linejoin="round">
        <use href="#pet" transform="rotate(0)" stroke="#d97757" stroke-width="11"/><use href="#pet" transform="rotate(0)" stroke="#faf9f5" stroke-width="5"/>
        <use href="#pet" transform="rotate(60)" stroke="#d97757" stroke-width="11"/><use href="#pet" transform="rotate(60)" stroke="#faf9f5" stroke-width="5"/>
        <use href="#pet" transform="rotate(120)" stroke="#d97757" stroke-width="11"/><use href="#pet" transform="rotate(120)" stroke="#faf9f5" stroke-width="5"/>
        <use href="#pet" transform="rotate(180)" stroke="#d97757" stroke-width="11"/><use href="#pet" transform="rotate(180)" stroke="#faf9f5" stroke-width="5"/>
        <use href="#pet" transform="rotate(240)" stroke="#d97757" stroke-width="11"/><use href="#pet" transform="rotate(240)" stroke="#faf9f5" stroke-width="5"/>
        <use href="#pet" transform="rotate(300)" stroke="#d97757" stroke-width="11"/><use href="#pet" transform="rotate(300)" stroke="#faf9f5" stroke-width="5"/>
      </g>
      <circle cx="80" cy="84" r="4.5" fill="#faf9f5"/>
    </g>

    <!-- V3 实心花瓣 + 中心立方 -->
    <g id="v3">
      <rect width="160" height="160" rx="36" fill="#d97757"/>
      <g transform="translate(80,84)" fill="#faf9f5">
        <use href="#pet" transform="rotate(0)"/><use href="#pet" transform="rotate(60)"/><use href="#pet" transform="rotate(120)"/>
        <use href="#pet" transform="rotate(180)"/><use href="#pet" transform="rotate(240)"/><use href="#pet" transform="rotate(300)"/>
      </g>
      <circle cx="80" cy="84" r="12" fill="#d97757"/>
      <path d="M80 74 L90.5 80 L80 86 L69.5 80 Z" fill="#faf9f5"/>
      <path d="M69.5 80 L80 86 L80 98 L69.5 92 Z" fill="#e0905f"/>
      <path d="M80 86 L90.5 80 L90.5 92 L80 98 Z" fill="#c66b3f"/>
    </g>

    <!-- V4 奶油底反色 -->
    <g id="v4">
      <rect width="160" height="160" rx="36" fill="#faf9f5"/>
      <g transform="translate(80,84)" fill="#d97757">
        <use href="#pet" transform="rotate(0)"/><use href="#pet" transform="rotate(60)"/><use href="#pet" transform="rotate(120)"/>
        <use href="#pet" transform="rotate(180)"/><use href="#pet" transform="rotate(240)"/><use href="#pet" transform="rotate(300)"/>
      </g>
      <circle cx="80" cy="84" r="7.5" fill="#faf9f5"/>
    </g>

    <!-- V5 双层星花 -->
    <g id="v5">
      <rect width="160" height="160" rx="36" fill="#d97757"/>
      <g transform="translate(80,84)">
        <g fill="#faf9f5">
          <use href="#pet" transform="rotate(0)"/><use href="#pet" transform="rotate(60)"/><use href="#pet" transform="rotate(120)"/>
          <use href="#pet" transform="rotate(180)"/><use href="#pet" transform="rotate(240)"/><use href="#pet" transform="rotate(300)"/>
        </g>
        <g fill="#f0b896">
          <use href="#petS" transform="rotate(30)"/><use href="#petS" transform="rotate(90)"/><use href="#petS" transform="rotate(150)"/>
          <use href="#petS" transform="rotate(210)"/><use href="#petS" transform="rotate(270)"/><use href="#petS" transform="rotate(330)"/>
        </g>
      </g>
      <circle cx="80" cy="84" r="6.5" fill="#d97757"/>
    </g>
  </defs>

  <rect width="1136" height="460" fill="#bcb6a8"/>

  <text x="48" y="48" font-size="28" font-weight="700" fill="#221f1a">六瓣花结 · 5 个优化版本</text>
  <text x="48" y="74" font-size="15" fill="#46423a">基于 ⑨ · 实心 / 描边交织 / 中心立方 / 反色 / 双层 —— 每个附 48px·24px 实际尺寸验证</text>

  <g transform="translate(986,28)">
    <rect x="0" y="0" width="22" height="22" rx="5" fill="#d97757"/>
    <rect x="26" y="0" width="22" height="22" rx="5" fill="#faf9f5" stroke="#0000001a"/>
    <rect x="52" y="0" width="22" height="22" rx="5" fill="#e5e2d9"/>
    <rect x="78" y="0" width="22" height="22" rx="5" fill="#1f1e1d"/>
    <rect x="104" y="0" width="22" height="22" rx="5" fill="#d4a27f"/>
  </g>

  <!-- V1 -->
  <use href="#v1" transform="translate(48,104) scale(1.15)" filter="url(#soft)"/>
  <use href="#v1" transform="translate(98,312) scale(0.3)"/>
  <use href="#v1" transform="translate(158,336) scale(0.15)"/>
  <text x="140" y="386" text-anchor="middle" font-size="15" font-weight="600" fill="#221f1a">V1 实心·镂空心</text>

  <!-- V2 -->
  <use href="#v2" transform="translate(262,104) scale(1.15)" filter="url(#soft)"/>
  <use href="#v2" transform="translate(312,312) scale(0.3)"/>
  <use href="#v2" transform="translate(372,336) scale(0.15)"/>
  <text x="354" y="386" text-anchor="middle" font-size="15" font-weight="600" fill="#221f1a">V2 描边·交织环</text>

  <!-- V3 -->
  <use href="#v3" transform="translate(476,104) scale(1.15)" filter="url(#soft)"/>
  <use href="#v3" transform="translate(526,312) scale(0.3)"/>
  <use href="#v3" transform="translate(586,336) scale(0.15)"/>
  <text x="568" y="386" text-anchor="middle" font-size="15" font-weight="600" fill="#221f1a">V3 实心·中心立方</text>

  <!-- V4 -->
  <use href="#v4" transform="translate(690,104) scale(1.15)" filter="url(#soft)"/>
  <use href="#v4" transform="translate(740,312) scale(0.3)"/>
  <use href="#v4" transform="translate(800,336) scale(0.15)"/>
  <text x="782" y="386" text-anchor="middle" font-size="15" font-weight="600" fill="#221f1a">V4 反色·奶油底</text>

  <!-- V5 -->
  <use href="#v5" transform="translate(904,104) scale(1.15)" filter="url(#soft)"/>
  <use href="#v5" transform="translate(954,312) scale(0.3)"/>
  <use href="#v5" transform="translate(1014,336) scale(0.15)"/>
  <text x="996" y="386" text-anchor="middle" font-size="15" font-weight="600" fill="#221f1a">V5 双层·星花</text>

  <text x="48" y="430" font-size="13" fill="#46423a">每个大图下方两块为 48px / 24px 实际渲染尺寸（检验缩小清晰度）。告诉我选哪个,以及要不要微调花瓣胖瘦 / 中心 / 配色。</text>
</svg>

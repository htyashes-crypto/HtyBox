<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1044 600" font-family="Segoe UI, Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdc7ba"/>
      <stop offset="1" stop-color="#b6b0a1"/>
    </linearGradient>
    <linearGradient id="cTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4cab2"/><stop offset="1" stop-color="#e79c7d"/>
    </linearGradient>
    <linearGradient id="cLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dd7d5c"/><stop offset="1" stop-color="#bf6040"/>
    </linearGradient>
    <linearGradient id="cRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bc5d3c"/><stop offset="1" stop-color="#9d4527"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#fff4e4" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fff4e4" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="tile"><rect width="160" height="160" rx="36"/></clipPath>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#3a2f28" flood-opacity="0.22"/>
    </filter>
    <filter id="blur5" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1044" height="600" fill="url(#page)"/>

  <text x="50" y="50" font-size="30" font-weight="700" fill="#221f1a">HtyBox · 应用图标方案 B</text>
  <text x="50" y="78" font-size="15" fill="#4d493f">换设计语言 · 字形 / 负空间 / 柔光 / 新拟态 / 网格 / 点阵 / 光感 / 动势 / 缎带</text>

  <g font-size="13" font-weight="600" text-anchor="middle">
    <g transform="translate(560,38)"><rect width="58" height="24" rx="12" fill="#faf9f5" stroke="#d97757" stroke-width="1.5"/><text x="29" y="16" fill="#b85a3d">简洁</text></g>
    <g transform="translate(626,38)"><rect width="58" height="24" rx="12" fill="#faf9f5" stroke="#d97757" stroke-width="1.5"/><text x="29" y="16" fill="#b85a3d">大气</text></g>
    <g transform="translate(692,38)"><rect width="58" height="24" rx="12" fill="#faf9f5" stroke="#d97757" stroke-width="1.5"/><text x="29" y="16" fill="#b85a3d">规则</text></g>
    <g transform="translate(758,38)"><rect width="58" height="24" rx="12" fill="#faf9f5" stroke="#d97757" stroke-width="1.5"/><text x="29" y="16" fill="#b85a3d">柔和</text></g>
    <g transform="translate(824,38)"><rect width="58" height="24" rx="12" fill="#faf9f5" stroke="#d97757" stroke-width="1.5"/><text x="29" y="16" fill="#b85a3d">Box</text></g>
  </g>

  <g transform="translate(908,30)">
    <rect x="0" y="0" width="22" height="22" rx="5" fill="#d97757"/>
    <rect x="26" y="0" width="22" height="22" rx="5" fill="#faf9f5" stroke="#0000001a"/>
    <rect x="52" y="0" width="22" height="22" rx="5" fill="#e5e2d9"/>
    <rect x="78" y="0" width="22" height="22" rx="5" fill="#1f1e1d"/>
    <rect x="104" y="0" width="22" height="22" rx="5" fill="#d4a27f"/>
  </g>

  <!-- ROW 0 -->
  <!-- 1 切角 H 字标 -->
  <g transform="translate(50,110)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <g clip-path="url(#tile)">
      <path d="M48 60 L60 48 L68 48 L68 80 L92 80 L92 48 L100 48 L112 60 L112 120 L100 132 L92 132 L92 100 L68 100 L68 132 L60 132 L48 120 Z" fill="#d97757"/>
    </g>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">① 切角 H 字标</text>
  </g>

  <!-- 2 负形立方 -->
  <g transform="translate(246,110)">
    <rect width="160" height="160" rx="36" fill="#d97757" filter="url(#soft)"/>
    <g clip-path="url(#tile)">
      <rect x="40" y="40" width="80" height="80" rx="20" fill="#faf9f5"/>
      <path d="M80 50 L106 65 L106 95 L80 110 L54 95 L54 65 Z" fill="none" stroke="#d97757" stroke-width="7" stroke-linejoin="round"/>
      <path d="M80 80 L80 50 M80 80 L106 95 M80 80 L54 95" fill="none" stroke="#d97757" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">② 负形立方</text>
  </g>

  <!-- 3 柔光立方 -->
  <g transform="translate(442,110)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <g clip-path="url(#tile)">
      <ellipse cx="80" cy="141" rx="42" ry="10" fill="#00000022" filter="url(#blur5)"/>
      <path d="M38 71 L80 96 L80 142 L38 117 Z" fill="url(#cLeft)" stroke="#cf6f4e" stroke-width="6" stroke-linejoin="round"/>
      <path d="M80 96 L122 71 L122 117 L80 142 Z" fill="url(#cRight)" stroke="#ad4f30" stroke-width="6" stroke-linejoin="round"/>
      <path d="M80 46 L122 71 L80 96 L38 71 Z" fill="url(#cTop)" stroke="#ecae8f" stroke-width="6" stroke-linejoin="round"/>
      <path d="M80 54 L104 68 L88 77 L66 64 Z" fill="#ffffff" opacity="0.30"/>
    </g>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">③ 柔光立方</text>
  </g>

  <!-- 4 新拟态盒 -->
  <g transform="translate(638,110)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <g clip-path="url(#tile)">
      <rect x="55" y="55" width="64" height="64" rx="20" fill="#cfc9ba" filter="url(#blur5)"/>
      <rect x="45" y="45" width="64" height="64" rx="20" fill="#ffffff" filter="url(#blur5)"/>
      <rect x="50" y="50" width="64" height="64" rx="20" fill="#faf9f5"/>
      <rect x="68" y="68" width="28" height="28" rx="9" fill="#d8d2c4"/>
      <rect x="70" y="70" width="28" height="28" rx="9" fill="#faf9f5"/>
      <circle cx="82" cy="82" r="6" fill="#d97757"/>
    </g>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">④ 新拟态盒</text>
  </g>

  <!-- 5 四格模块盒 -->
  <g transform="translate(834,110)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <g clip-path="url(#tile)">
      <rect x="42" y="42" width="80" height="80" rx="18" fill="none" stroke="#e5e2d9" stroke-width="2"/>
      <rect x="48" y="48" width="34" height="34" rx="10" fill="#e7e2d6" stroke="#d8d3c6" stroke-width="1.5"/>
      <rect x="88" y="48" width="34" height="34" rx="10" fill="#d97757"/>
      <rect x="48" y="88" width="34" height="34" rx="10" fill="#e7e2d6" stroke="#d8d3c6" stroke-width="1.5"/>
      <rect x="88" y="88" width="34" height="34" rx="10" fill="#e7e2d6" stroke="#d8d3c6" stroke-width="1.5"/>
    </g>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑤ 四格模块盒</text>
  </g>

  <!-- ROW 1 -->
  <!-- 6 同心点阵盒 -->
  <g transform="translate(50,344)">
    <rect width="160" height="160" rx="36" fill="#1f1e1d" filter="url(#soft)"/>
    <g clip-path="url(#tile)" fill="#d97757">
      <circle cx="52" cy="52" r="4"/><circle cx="68" cy="52" r="4"/><circle cx="84" cy="52" r="4"/><circle cx="100" cy="52" r="4"/><circle cx="116" cy="52" r="4"/>
      <circle cx="52" cy="116" r="4"/><circle cx="68" cy="116" r="4"/><circle cx="84" cy="116" r="4"/><circle cx="100" cy="116" r="4"/><circle cx="116" cy="116" r="4"/>
      <circle cx="52" cy="68" r="4"/><circle cx="52" cy="84" r="4"/><circle cx="52" cy="100" r="4"/>
      <circle cx="116" cy="68" r="4"/><circle cx="116" cy="84" r="4"/><circle cx="116" cy="100" r="4"/>
      <circle cx="84" cy="84" r="7" fill="#ecb59c"/>
    </g>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑥ 同心点阵盒</text>
  </g>

  <!-- 7 开口溢光盒 -->
  <g transform="translate(246,344)">
    <rect width="160" height="160" rx="36" fill="#1f1e1d" filter="url(#soft)"/>
    <g clip-path="url(#tile)">
      <path d="M42 80 L80 100 L80 138 L42 116 Z" fill="#d97757"/>
      <path d="M80 100 L118 80 L118 116 L80 138 Z" fill="#b0552f"/>
      <path d="M44 70 L80 49 L116 70 L80 91 Z" fill="#ecb59c"/>
      <path d="M80 96 L102 34 L58 34 Z" fill="url(#glow)"/>
      <circle cx="80" cy="44" r="3" fill="#fff3e0"/><circle cx="92" cy="54" r="2" fill="#fff3e0"/><circle cx="68" cy="52" r="2" fill="#fff3e0"/>
    </g>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑦ 开口溢光盒</text>
  </g>

  <!-- 8 箭入盒口 -->
  <g transform="translate(442,344)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <g clip-path="url(#tile)">
      <rect x="46" y="74" width="68" height="52" rx="14" fill="#d97757"/>
      <rect x="58" y="76" width="44" height="8" rx="4" fill="#8f4a30"/>
      <g transform="rotate(38 80 58)">
        <rect x="73" y="30" width="13" height="34" rx="6" fill="#1f1e1d"/>
        <path d="M70 62 L89 62 L79.5 78 Z" fill="#1f1e1d"/>
      </g>
      <path d="M108 40 q9 5 5 17" stroke="#d4a27f" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑧ 箭入盒口</text>
  </g>

  <!-- 9 hb 字标 -->
  <g transform="translate(638,344)">
    <rect width="160" height="160" rx="36" fill="#faf9f5" filter="url(#soft)"/>
    <g clip-path="url(#tile)">
      <rect x="40" y="40" width="80" height="80" rx="22" fill="#d97757"/>
      <text x="80" y="99" text-anchor="middle" font-size="56" font-weight="800" fill="#faf9f5" font-family="Segoe UI, Microsoft YaHei, sans-serif">hb</text>
    </g>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑨ hb 字标</text>
  </g>

  <!-- 10 流动缎带盒 -->
  <g transform="translate(834,344)">
    <rect width="160" height="160" rx="36" fill="#d97757" filter="url(#soft)"/>
    <g clip-path="url(#tile)">
      <path d="M80 76 L80 124" stroke="#efe5dc" stroke-width="18" fill="none" stroke-linecap="round"/>
      <path d="M40 98 L80 76 L120 98" stroke="#faf9f5" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="80" cy="76" r="4.5" fill="#ffffff"/>
    </g>
    <text x="80" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#2a2722">⑩ 流动缎带盒</text>
  </g>

  <text x="50" y="568" font-size="13" fill="#4d493f">方案 B 刻意拉开风格跨度 —— 告诉我「喜欢哪一类气质」或直接给编号，我据此收敛或微调。</text>
</svg>

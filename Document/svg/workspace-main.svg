<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif; }
      .mono { font-family: 'Consolas', 'Menlo', monospace; }
      .ink-1 { fill: #e6e8ee; } .ink-2 { fill: #b8bdc8; } .ink-3 { fill: #8a92a3; } .ink-4 { fill: #5c6478; }
      .brand { fill: #8b7cff; } .claude { fill: #d97757; } .codex { fill: #10a37f; }
      .ok { fill: #22c55e; } .warn { fill: #f59e0b; } .err { fill: #f43f5e; } .info { fill: #60a5fa; }
      .panel { fill: #161a21; } .card { fill: #20242c; stroke: #2a2f3a; stroke-width: 1; }
      .term { fill: #0b0d11; }
      .sep { stroke: #2a2f3a; stroke-width: 1; }
      .h-label { font-size: 11px; font-weight: 700; fill: #8a92a3; letter-spacing: 1px; }
      .title { font-size: 12px; font-weight: 700; fill: #e6e8ee; }
      .desc { font-size: 10.5px; fill: #8a92a3; }
      .badge { font-size: 9.5px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#0f1115"/>

  <!-- ================= 顶部栏:workspace 标签 ================= -->
  <rect width="1440" height="44" class="panel"/>
  <line x1="0" y1="44" x2="1440" y2="44" class="sep"/>
  <rect x="16" y="14" width="16" height="16" rx="4" class="brand" opacity="0.9"/>
  <text x="40" y="27" font-size="14" font-weight="700" class="ink-1">HtyBox</text>

  <!-- workspace tabs -->
  <rect x="120" y="8" width="132" height="36" rx="8" fill="#20242c" stroke="#3a4150"/>
  <rect x="120" y="8" width="132" height="3" rx="1.5" class="brand"/>
  <text x="136" y="31" font-size="12.5" font-weight="600" class="ink-1">workspace1</text>
  <circle cx="232" cy="26" r="7" class="ok" opacity="0.16"/>
  <text x="232" y="29" font-size="9" font-weight="700" class="ok" text-anchor="middle">3</text>

  <rect x="260" y="8" width="124" height="36" rx="8" fill="transparent" stroke="#2a2f3a"/>
  <text x="276" y="31" font-size="12.5" class="ink-3">workspace2</text>
  <text x="364" y="31" font-size="11" class="ink-4">⏸</text>

  <text x="402" y="31" font-size="18" class="ink-3">+</text>

  <!-- 右侧:多 Agent 协作入口 + 设置 + 窗口控件 -->
  <rect x="1086" y="9" width="172" height="34" rx="8" fill="rgba(139,124,255,0.14)" stroke="rgba(139,124,255,0.45)"/>
  <circle cx="1104" cy="26" r="4" class="brand"/>
  <text x="1116" y="30" font-size="12" font-weight="600" class="brand">多 Agent 协作</text>
  <text x="1286" y="31" font-size="15" class="ink-3">⚙</text>
  <text x="1336" y="30" font-size="14" class="ink-3">—</text>
  <text x="1372" y="30" font-size="13" class="ink-3">▢</text>
  <text x="1408" y="30" font-size="13" class="ink-3">✕</text>

  <!-- ================= 左栏:Skill ================= -->
  <rect x="0" y="44" width="260" height="832" class="panel"/>
  <line x1="260" y1="44" x2="260" y2="876" class="sep"/>
  <text x="16" y="74" class="h-label">SKILL · 12</text>
  <!-- 搜索框 -->
  <rect x="12" y="84" width="236" height="32" rx="8" fill="#0f1115" stroke="#2a2f3a"/>
  <text x="26" y="104" font-size="12" class="ink-4">🔍  搜索 skill…</text>

  <!-- skill 卡片 -->
  <!-- card template: y, name, source, srccolor, desc -->
  <g>
    <rect x="12" y="128" width="236" height="60" rx="10" class="card"/>
    <text x="24" y="150" class="title">frontend-design</text>
    <rect x="150" y="138" width="48" height="16" rx="6" fill="rgba(96,165,250,0.16)"/>
    <text x="174" y="150" class="badge info" text-anchor="middle">plugin</text>
    <text x="24" y="170" class="desc">production-grade frontend 界面生成</text>
    <text x="232" y="170" font-size="12" class="ink-4" text-anchor="end">⠿</text>
  </g>
  <g>
    <rect x="12" y="196" width="236" height="60" rx="10" class="card"/>
    <text x="24" y="218" class="title">deep-research</text>
    <rect x="142" y="206" width="40" height="16" rx="6" fill="rgba(34,197,94,0.16)"/>
    <text x="162" y="218" class="badge ok" text-anchor="middle">user</text>
    <text x="24" y="238" class="desc">多源检索 + 事实核查报告</text>
    <text x="232" y="238" font-size="12" class="ink-4" text-anchor="end">⠿</text>
  </g>
  <g>
    <rect x="12" y="264" width="236" height="60" rx="10" class="card"/>
    <text x="24" y="286" class="title">code-review</text>
    <rect x="130" y="274" width="54" height="16" rx="6" fill="rgba(245,158,11,0.16)"/>
    <text x="157" y="286" class="badge warn" text-anchor="middle">project</text>
    <text x="24" y="306" class="desc">审查当前 diff 的正确性问题</text>
    <text x="232" y="306" font-size="12" class="ink-4" text-anchor="end">⠿</text>
  </g>
  <g>
    <rect x="12" y="332" width="236" height="60" rx="10" class="card"/>
    <text x="24" y="354" class="title">svg-mockup</text>
    <rect x="126" y="342" width="54" height="16" rx="6" fill="rgba(245,158,11,0.16)"/>
    <text x="153" y="354" class="badge warn" text-anchor="middle">project</text>
    <text x="24" y="374" class="desc">写码前生成 UI mockup SVG</text>
    <text x="232" y="374" font-size="12" class="ink-4" text-anchor="end">⠿</text>
  </g>
  <g>
    <rect x="12" y="400" width="236" height="60" rx="10" class="card"/>
    <text x="24" y="422" class="title">verify</text>
    <rect x="92" y="410" width="48" height="16" rx="6" fill="rgba(96,165,250,0.16)"/>
    <text x="116" y="422" class="badge info" text-anchor="middle">plugin</text>
    <text x="24" y="442" class="desc">跑起来验证改动是否真生效</text>
    <text x="232" y="442" font-size="12" class="ink-4" text-anchor="end">⠿</text>
  </g>

  <!-- 拖拽中的 skill 幽灵卡 + 注入提示(展示核心交互) -->
  <g opacity="0.96">
    <rect x="470" y="300" width="220" height="52" rx="10" fill="#262b35" stroke="#8b7cff" stroke-width="1.5"/>
    <text x="484" y="322" class="title">frontend-design</text>
    <text x="484" y="340" class="desc">拖拽中…</text>

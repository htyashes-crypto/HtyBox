    <text x="470" y="305" font-size="13" font-weight="700" fill="#0f1115" text-anchor="middle">＋</text>
  </g>
  <path d="M 250 360 C 360 360, 380 326, 466 326" fill="none" stroke="#8b7cff" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- ================= 中栏:终端区 ================= -->
  <!-- 终端标签栏 -->
  <rect x="261" y="44" width="819" height="34" fill="#13161c"/>
  <line x1="261" y1="78" x2="1080" y2="78" class="sep"/>
  <rect x="272" y="50" width="150" height="28" rx="7" fill="#0b0d11" stroke="#3a4150"/>
  <circle cx="288" cy="64" r="4" class="claude"/>
  <text x="300" y="68" font-size="11.5" font-weight="600" class="ink-1">终端1 · 负责人</text>
  <text x="412" y="68" font-size="11" class="ink-4">✕</text>
  <rect x="430" y="50" width="150" height="28" rx="7" fill="transparent"/>
  <circle cx="446" cy="64" r="4" class="codex"/>
  <text x="458" y="68" font-size="11.5" class="ink-3">终端2 · 维护员</text>
  <text x="570" y="68" font-size="11" class="ink-4">✕</text>
  <text x="598" y="68" font-size="16" class="ink-3">+</text>
  <text x="1056" y="68" font-size="13" class="ink-3">⫶⫶</text>

  <!-- 终端1 (active, 焦点紫框) claude -->
  <rect x="266" y="84" width="404" height="786" rx="10" class="term"/>
  <rect x="266" y="84" width="404" height="786" rx="10" fill="none" stroke="#8b7cff" stroke-width="1.5"/>
  <rect x="266" y="84" width="404" height="26" rx="10" fill="#15171d"/>
  <rect x="266" y="98" width="404" height="12" fill="#15171d"/>
  <circle cx="282" cy="97" r="4" class="claude"/>
  <text x="294" y="101" font-size="10.5" class="ink-2">终端1 — 负责人 · ClaudeCode opus-4-8</text>
  <text x="658" y="101" font-size="10.5" class="ink-4" text-anchor="end">▶ running</text>
  <!-- claude content -->
  <text x="282" y="138" font-size="11" class="mono claude">╭─ ✻ Claude Code · 负责人 ───────────╮</text>
  <text x="282" y="156" font-size="11" class="mono ink-3">│ /frontend-design  已加载            │</text>
  <text x="282" y="174" font-size="11" class="mono claude">╰────────────────────────────────────╯</text>
  <text x="282" y="202" font-size="11" class="mono ink-2">&gt; 分析模块结构, 制定重构计划</text>
  <text x="282" y="228" font-size="11" class="mono ink-1">● 先让维护员探索代码现状……</text>
  <text x="298" y="246" font-size="11" class="mono brand">⎿ assign_task → 维护员 (scope: 只读)</text>
  <text x="282" y="272" font-size="11" class="mono ink-3">● 等待回报中  (await_next 已挂起)</text>
  <text x="282" y="316" font-size="11" class="mono ok">＋ 注入: /frontend-design</text>
  <text x="282" y="800" font-size="11" class="mono ink-2">&gt; <tspan class="ink-1">▊</tspan></text>

  <!-- 分屏拖动条 -->
  <rect x="670" y="84" width="6" height="786" fill="#0f1115"/>
  <rect x="671.5" y="455" width="3" height="44" rx="1.5" fill="#3a4150"/>

  <!-- 终端2 codex -->
  <rect x="676" y="84" width="398" height="786" rx="10" class="term"/>
  <rect x="676" y="84" width="398" height="26" rx="10" fill="#15171d"/>
  <rect x="676" y="98" width="398" height="12" fill="#15171d"/>
  <circle cx="692" cy="97" r="4" class="codex"/>
  <text x="704" y="101" font-size="10.5" class="ink-2">终端2 — 维护员 · Codex gpt-5.5</text>
  <text x="1062" y="101" font-size="10.5" class="ink-4" text-anchor="end">▶ working</text>
  <text x="692" y="140" font-size="11" class="mono codex">codex › 维护员 (gpt-5.5)</text>
  <text x="692" y="166" font-size="11" class="mono ink-2">收到任务: 探索 Assets/Scripts/ 现状</text>
  <text x="692" y="192" font-size="11" class="mono ink-3">扫描脚本……</text>
  <text x="692" y="210" font-size="11" class="mono ok">✓ 已扫描 142 个脚本 / 8 个程序集</text>
  <text x="692" y="236" font-size="11" class="mono ink-3">归纳模块依赖关系……</text>
  <text x="692" y="262" font-size="11" class="mono ink-1">● 正在汇总代码事实, 准备 report_result</text>
  <text x="692" y="800" font-size="11" class="mono ink-2">› <tspan class="ink-1">▊</tspan></text>

  <!-- ================= 右栏:Memory ================= -->
  <rect x="1080" y="44" width="360" height="832" class="panel"/>
  <line x1="1080" y1="44" x2="1080" y2="876" class="sep"/>
  <text x="1096" y="74" class="h-label">MEMORY</text>
  <rect x="1212" y="62" width="216" height="22" rx="6" fill="#0f1115" stroke="#2a2f3a"/>
  <text x="1224" y="77" font-size="10.5" class="mono ink-2">G:\hty_workflows</text>
  <text x="1416" y="77" font-size="10" class="ink-4">▾</text>

  <g>
    <rect x="1096" y="98" width="328" height="62" rx="10" class="card"/>
    <text x="1108" y="120" class="title">project-htybox</text>
    <rect x="1300" y="106" width="54" height="16" rx="6" fill="rgba(245,158,11,0.16)"/>
    <text x="1327" y="118" class="badge warn" text-anchor="middle">project</text>
    <text x="1108" y="142" class="desc">HtyBox 产品定义 + 技术栈 + 决策</text>
  </g>
  <g>
    <rect x="1096" y="168" width="328" height="62" rx="10" class="card"/>
    <text x="1108" y="190" class="title">user-role</text>
    <rect x="1322" y="176" width="40" height="16" rx="6" fill="rgba(34,197,94,0.16)"/>
    <text x="1342" y="188" class="badge ok" text-anchor="middle">user</text>
    <text x="1108" y="212" class="desc">接手项目的开发者背景与沟通偏好</text>
  </g>
  <g>
    <rect x="1096" y="238" width="328" height="62" rx="10" class="card"/>
    <text x="1108" y="260" class="title">team-conventions</text>
    <rect x="1290" y="246" width="64" height="16" rx="6" fill="rgba(96,165,250,0.16)"/>
    <text x="1322" y="258" class="badge info" text-anchor="middle">reference</text>
    <text x="1108" y="282" class="desc">提交/分支规范、命名约定</text>
  </g>
  <g>
    <rect x="1096" y="308" width="328" height="62" rx="10" class="card"/>
    <text x="1108" y="330" class="title">refactor-feedback</text>
    <rect x="1294" y="316" width="60" height="16" rx="6" fill="rgba(244,63,94,0.16)"/>
    <text x="1324" y="328" class="badge err" text-anchor="middle">feedback</text>
    <text x="1108" y="352" class="desc">禁止兜底式补丁, 要根因式修复</text>
  </g>

  <!-- 拖 memory 提示 -->
  <text x="1096" y="396" font-size="10.5" class="ink-4">拖任意卡片到终端 → 注入 @绝对路径</text>

  <!-- ================= 底部状态栏 ================= -->
  <rect x="0" y="876" width="1440" height="24" class="panel"/>
  <line x1="0" y1="876" x2="1440" y2="876" class="sep"/>
  <circle cx="16" cy="888" r="4" class="ok"/>
  <text x="28" y="892" font-size="10.5" class="ink-3">2 终端运行中 · workspace1</text>
  <text x="720" y="892" font-size="10.5" class="mono ink-4" text-anchor="middle">拖拽 skill/memory 即可喂给当前终端的 Claude Code / Codex</text>
  <text x="1424" y="892" font-size="10.5" class="ink-4" text-anchor="end">HtyBox v0.1 · Tauri</text>
</svg>

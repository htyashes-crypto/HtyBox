    <text x="44" y="690" class="ink-4">04:32:55</text><circle cx="122" cy="686" r="3.5" class="codex"/><text x="132" y="690" class="ink-3">维护员</text><text x="214" y="690" class="ink-2">report_result(t1, 部分进展)</text><text x="848" y="690" class="ok" text-anchor="end">→ ok（已存）</text>

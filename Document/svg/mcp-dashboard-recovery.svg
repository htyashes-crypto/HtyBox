    <text x="44" y="562" class="ink-4">04:33:06</text><circle cx="122" cy="558" r="3.5" class="codex"/><text x="132" y="562" class="ink-3">维护员</text><text x="214" y="562" class="ink-2">whoami()</text><text x="848" y="562" class="ok" text-anchor="end">→ task=t1</text>

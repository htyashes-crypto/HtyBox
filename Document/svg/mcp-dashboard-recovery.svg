    <text x="44" y="746" class="ink-4">04:32:20</text><circle cx="122" cy="742" r="3.5" class="claude"/><text x="132" y="746" class="ink-3">负责人</text><text x="214" y="746" class="ink-2">write_shared("goal",…)</text><text x="848" y="746" class="ok" text-anchor="end">→ ok</text>
  </g>

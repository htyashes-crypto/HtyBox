<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif; }
      .mono { font-family: 'Consolas', 'Menlo', monospace; }
      .ink-1 { fill: #e6e8ee; } .ink-2 { fill: #b8bdc8; } .ink-3 { fill: #8a92a3; } .ink-4 { fill: #5c6478; }
      .brand { fill: #8b7cff; } .claude { fill: #d97757; } .codex { fill: #10a37f; }
      .ok { fill: #22c55e; } .warn { fill: #f59e0b; } .err { fill: #f43f5e; } .info { fill: #60a5fa; }
      .panel { fill: #161a21; } .card { fill: #20242c; stroke: #2a2f3a; stroke-width: 1; }
      .sep { stroke: #2a2f3a; stroke-width: 1; }
      .title { font-size: 16px; font-weight: 700; fill: #e6e8ee; }
      .sub { font-size: 12px; fill: #8a92a3; }
      .role { font-size: 12.5px; font-weight: 600; fill: #e6e8ee; }
      .meta { font-size: 11px; fill: #8a92a3; }
      .btn-p { fill: #8b7cff; } .btn-pt { font-size: 12px; font-weight: 700; fill: #0f1115; }
      .btn-g { fill: transparent; stroke: #2a2f3a; stroke-width: 1; }
      .btn-gt { font-size: 11.5px; fill: #b8bdc8; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#0f1115"/>

  <!-- 顶栏 + 面包屑 -->
  <rect width="1440" height="44" class="panel"/>
  <line x1="0" y1="44" x2="1440" y2="44" class="sep"/>
  <rect x="16" y="14" width="16" height="16" rx="4" class="brand" opacity="0.9"/>
  <text x="40" y="27" font-size="14" font-weight="700" class="ink-1">HtyBox</text>
  <text x="120" y="28" font-size="12.5" class="ink-3">← 工作区</text>
  <text x="200" y="28" font-size="12.5" class="ink-4">/</text>
  <text x="214" y="28" font-size="12.5" font-weight="700" class="brand">多 Agent 协作 · 团队库</text>
  <text x="1372" y="30" font-size="13" class="ink-3">▢</text>
  <text x="1408" y="30" font-size="13" class="ink-3">✕</text>

  <!-- 标题区 -->
  <text x="28" y="86" class="title" font-size="20">团队库</text>
  <text x="28" y="110" class="sub">选择一个团队，一键开启多终端协作 · 每个 agent 自定义身份 / 类型 / 模型 / 职责</text>
  <rect x="824" y="74" width="64" height="30" rx="8" class="btn-g"/>
  <text x="856" y="93" class="btn-gt" text-anchor="middle">导入</text>
  <rect x="896" y="74" width="64" height="30" rx="8" class="btn-g"/>
  <text x="928" y="93" class="btn-gt" text-anchor="middle">导出</text>

  <!-- ============ 团队卡片网格 ============ -->
  <!-- 卡 1: 标准开发三人组 (选中, 紫框) -->
  <rect x="28" y="128" width="452" height="236" rx="14" fill="#20242c" stroke="#8b7cff" stroke-width="1.5"/>
  <text x="48" y="160" class="title">标准开发三人组</text>
  <rect x="220" y="146" width="42" height="18" rx="6" fill="rgba(139,124,255,0.16)"/>
  <text x="241" y="159" font-size="10" font-weight="700" class="brand" text-anchor="middle">3 人</text>
  <text x="48" y="182" class="sub">需求→调研→计划，最常用的开发协作组</text>
  <line x1="48" y1="196" x2="460" y2="196" class="sep"/>
  <!-- members -->
  <text x="48" y="222" font-size="13">👑</text><circle cx="74" cy="217" r="4" class="claude"/>
  <text x="86" y="222" class="role">负责人</text>
  <text x="220" y="222" class="meta">ClaudeCode · opus-4-8</text>
  <rect x="404" y="209" width="56" height="16" rx="6" fill="rgba(139,124,255,0.16)"/>
  <text x="432" y="221" font-size="9.5" font-weight="700" class="brand" text-anchor="middle">Lead</text>

  <text x="48" y="250" font-size="13">🔧</text><circle cx="74" cy="245" r="4" class="codex"/>
  <text x="86" y="250" class="role">维护员</text>
  <text x="220" y="250" class="meta">Codex · gpt-5.5</text>

  <text x="48" y="278" font-size="13">📝</text><circle cx="74" cy="273" r="4" class="claude"/>
  <text x="86" y="278" class="role">计划书写员</text>
  <text x="220" y="278" class="meta">ClaudeCode · opus-4-8</text>
  <line x1="48" y1="296" x2="460" y2="296" class="sep"/>
  <!-- footer buttons -->
  <rect x="48" y="312" width="118" height="34" rx="8" class="btn-p"/>
  <text x="107" y="334" class="btn-pt" text-anchor="middle">▶ 一键开启</text>
  <rect x="178" y="312" width="64" height="34" rx="8" class="btn-g"/>
  <text x="210" y="334" class="btn-gt" text-anchor="middle">编辑</text>
  <rect x="254" y="312" width="64" height="34" rx="8" class="btn-g"/>
  <text x="286" y="334" class="btn-gt" text-anchor="middle">复制</text>
  <rect x="408" y="312" width="52" height="34" rx="8" class="btn-g"/>
  <text x="434" y="334" class="btn-gt err" text-anchor="middle">删除</text>

  <!-- 卡 2: 调研双人组 -->
  <rect x="504" y="128" width="452" height="236" rx="14" class="card"/>
  <text x="524" y="160" class="title">调研双人组</text>
  <rect x="660" y="146" width="42" height="18" rx="6" fill="rgba(139,124,255,0.16)"/>
  <text x="681" y="159" font-size="10" font-weight="700" class="brand" text-anchor="middle">2 人</text>
  <text x="524" y="182" class="sub">快速摸清现状 + 给出结论，轻量两人</text>
  <line x1="524" y1="196" x2="936" y2="196" class="sep"/>
  <text x="524" y="222" font-size="13">👑</text><circle cx="550" cy="217" r="4" class="claude"/>
  <text x="562" y="222" class="role">负责人</text>
  <text x="696" y="222" class="meta">ClaudeCode · sonnet-4-6</text>
  <rect x="880" y="209" width="56" height="16" rx="6" fill="rgba(139,124,255,0.16)"/>
  <text x="908" y="221" font-size="9.5" font-weight="700" class="brand" text-anchor="middle">Lead</text>
  <text x="524" y="250" font-size="13">🔍</text><circle cx="550" cy="245" r="4" class="codex"/>
  <text x="562" y="250" class="role">调研员</text>
  <text x="696" y="250" class="meta">Codex · gpt-5.5</text>
  <line x1="524" y1="296" x2="936" y2="296" class="sep"/>
  <rect x="524" y="312" width="118" height="34" rx="8" class="btn-p"/>
  <text x="583" y="334" class="btn-pt" text-anchor="middle">▶ 一键开启</text>
  <rect x="654" y="312" width="64" height="34" rx="8" class="btn-g"/>
  <text x="686" y="334" class="btn-gt" text-anchor="middle">编辑</text>
  <rect x="730" y="312" width="64" height="34" rx="8" class="btn-g"/>
  <text x="762" y="334" class="btn-gt" text-anchor="middle">复制</text>

  <!-- 卡 3: 全栈四人组 -->
  <rect x="28" y="384" width="452" height="236" rx="14" class="card"/>
  <text x="48" y="416" class="title">全栈四人组</text>
  <rect x="172" y="402" width="42" height="18" rx="6" fill="rgba(139,124,255,0.16)"/>
  <text x="193" y="415" font-size="10" font-weight="700" class="brand" text-anchor="middle">4 人</text>
  <text x="48" y="438" class="sub">架构 + 后端 + 前端 + 测试，完整流水</text>
  <line x1="48" y1="452" x2="460" y2="452" class="sep"/>
  <text x="48" y="476" font-size="12">👑</text><circle cx="74" cy="471" r="4" class="claude"/>
  <text x="86" y="476" class="role" font-size="12">架构师</text><text x="220" y="476" class="meta">claude · opus-4-8</text>
  <text x="48" y="500" font-size="12">🔧</text><circle cx="74" cy="495" r="4" class="codex"/>
  <text x="86" y="500" class="role" font-size="12">后端</text><text x="220" y="500" class="meta">codex · gpt-5.5</text>
  <text x="48" y="524" font-size="12">🎨</text><circle cx="74" cy="519" r="4" class="claude"/>
  <text x="86" y="524" class="role" font-size="12">前端</text><text x="220" y="524" class="meta">claude · sonnet-4-6</text>
  <text x="48" y="548" font-size="12">🧪</text><circle cx="74" cy="543" r="4" class="codex"/>
  <text x="86" y="548" class="role" font-size="12">测试</text><text x="220" y="548" class="meta">codex · gpt-5.5</text>
  <line x1="48" y1="566" x2="460" y2="566" class="sep"/>
  <rect x="48" y="578" width="118" height="34" rx="8" class="btn-p"/>
  <text x="107" y="600" class="btn-pt" text-anchor="middle">▶ 一键开启</text>
  <rect x="178" y="578" width="64" height="34" rx="8" class="btn-g"/>
  <text x="210" y="600" class="btn-gt" text-anchor="middle">编辑</text>

  <!-- 新建团队 幽灵卡 -->
  <rect x="504" y="384" width="452" height="236" rx="14" fill="transparent" stroke="#2a2f3a" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="730" y="500" font-size="30" class="ink-4" text-anchor="middle">＋</text>
  <text x="730" y="532" font-size="13" font-weight="600" class="ink-3" text-anchor="middle">新建团队</text>

  <!-- ============ 右侧:一键开启面板 ============ -->
  <rect x="980" y="128" width="436" height="700" rx="14" class="panel" stroke="#2a2f3a"/>
  <text x="1004" y="162" class="title">一键开启</text>
  <text x="1004" y="184" class="sub">标准开发三人组</text>
  <line x1="1004" y1="200" x2="1392" y2="200" class="sep"/>

  <!-- 角色→终端映射 -->
  <text x="1004" y="226" font-size="11" font-weight="700" class="ink-3" letter-spacing="0.6">角色 → 终端</text>
  <rect x="1004" y="238" width="388" height="44" rx="8" fill="#20242c" stroke="#2a2f3a"/>
  <text x="1018" y="265" font-size="11" class="mono ink-3">终端1</text>
  <text x="1066" y="265" font-size="12">👑</text>
  <text x="1086" y="265" class="role">负责人</text>
  <text x="1378" y="265" class="meta" text-anchor="end">claude·opus</text>
  <rect x="1004" y="288" width="388" height="44" rx="8" fill="#20242c" stroke="#2a2f3a"/>
  <text x="1018" y="315" font-size="11" class="mono ink-3">终端2</text>
  <text x="1066" y="315" font-size="12">🔧</text>
  <text x="1086" y="315" class="role">维护员</text>
  <text x="1378" y="315" class="meta" text-anchor="end">codex·gpt5.5</text>
  <rect x="1004" y="338" width="388" height="44" rx="8" fill="#20242c" stroke="#2a2f3a"/>
  <text x="1018" y="365" font-size="11" class="mono ink-3">终端3</text>
  <text x="1066" y="365" font-size="12">📝</text>
  <text x="1086" y="365" class="role">计划书写员</text>
  <text x="1378" y="365" class="meta" text-anchor="end">claude·opus</text>

  <!-- 本次总目标 -->
  <text x="1004" y="416" font-size="11" font-weight="700" class="ink-3" letter-spacing="0.6">本次总目标（可选，交给 Lead）</text>
  <rect x="1004" y="426" width="388" height="92" rx="8" fill="#0f1115" stroke="#2a2f3a"/>
  <text x="1018" y="450" font-size="11.5" class="ink-4">例如：为登录模块梳理现状并产出</text>
  <text x="1018" y="470" font-size="11.5" class="ink-4">一份可执行的重构计划……</text>

  <!-- 工作区选择 -->
  <text x="1004" y="548" font-size="11" font-weight="700" class="ink-3" letter-spacing="0.6">工作区</text>
  <rect x="1004" y="558" width="388" height="38" rx="8" fill="#0f1115" stroke="#2a2f3a"/>
  <text x="1018" y="582" font-size="12" class="ink-1">＋ 新建工作区</text>
  <text x="1378" y="582" font-size="10" class="ink-4" text-anchor="end">▾</text>

  <!-- 护栏提示 -->
  <rect x="1004" y="612" width="388" height="56" rx="8" fill="rgba(245,158,11,0.10)" stroke="rgba(245,158,11,0.30)"/>
  <text x="1018" y="635" font-size="11" font-weight="700" class="warn">护栏已启用</text>
  <text x="1018" y="654" font-size="10.5" class="ink-3">最大 30 轮 · 死循环检测 · 文件越界裁判 · 一键急停</text>

  <!-- 开始按钮 -->
  <rect x="1004" y="700" width="388" height="48" rx="10" class="btn-p"/>
  <text x="1198" y="730" font-size="15" font-weight="700" fill="#0f1115" text-anchor="middle">▶  开始协作</text>
  <text x="1198" y="772" font-size="10.5" class="ink-4" text-anchor="middle">将新建 workspace、起 3 个终端并接入 MCP 协作</text>
</svg>

# HtyBox 自动发布 Release —— 由 /changelog-publish 推送的 v* tag 触发
#
# 三段式(根治 tauri-action 在 matrix 并发下重复创建 draft 的竞态):
#   1) create-release : 先建【唯一】draft release(正文取 RELEASE_NOTES.md)
#   2) build-tauri     : 各平台并行构建,用 releaseId 上传产物到同一个 release
#   3) publish-release : 全部完成后 publish + make_latest(自更新闭环)
#
# 一次性前置(GitHub 仓库 → Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD(updater 签名)
#   缺这两个 secret 会因 createUpdaterArtifacts:true 构建失败。

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.mk.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Read release notes
        id: notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            { echo 'body<<EOF'; cat RELEASE_NOTES.md; echo EOF; } >> "$GITHUB_OUTPUT"
          else
            { echo 'body<<EOF'; echo '下载下方安装包即可安装本版本。'; echo EOF; } >> "$GITHUB_OUTPUT"
          fi
      - name: Create single draft release
        id: mk
        uses: actions/github-script@v7
        env:
          NOTES: ${{ steps.notes.outputs.body }}
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `HtyBox ${tag}`,
              body: process.env.NOTES,
              draft: true,
              prerelease: false,
            })
            return data.id

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        run: pnpm install
      - name: Build and upload to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-22.04
    steps:
      - name: Publish release and set as latest
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: false,
              make_latest: 'true',
            })
